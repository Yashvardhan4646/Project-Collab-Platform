name: Keep Supabase warm

# Free-tier Supabase projects auto-pause after 7 idle days. This weekly
# authenticated ping keeps the project awake. Reads credentials from repo
# secrets (Settings -> Secrets and variables -> Actions): SUPABASE_URL, SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday, 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticated GET against Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL / SUPABASE_ANON_KEY repo secrets."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "${SUPABASE_URL%/}/rest/v1/")
          echo "REST endpoint returned HTTP $code"
          # Any HTTP status means the project is awake. Only a transport-level
          # failure (curl non-zero exit) fails the job.
